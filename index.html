<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <title>Tic Tac Toe</title>
</head>

<body>
    <nav class="mainNav">
        <div class="playResetBtn playBtn showPlayBtn">Play</div>
        <div class="playResetBtn playAgainBtn hidePlayAgain">Play Again</div>
        <div class="navTitle" id="navTitle"></div>
        <div class="playResetBtn resetBtn">Reset</div>
    </nav>
    <div class="mainGameBody">
        <div class="detailCard playerOneDetails">
            <div class="inputGroup showDetailInput">
                <label for="nameOne">Player One Name</label>
                <input class="inputStl playerOne" name="nameOne" id="nameOne" required>
                <label for="playerOneMarker">Enter your marker (eg. X)</label>
                <input class="inputStl markerOne" name="playerOneMarker" id="playerOneMarker" maxlength="1" required>
            </div>
            <div class="scoreCardCmm scoreCardP1 hiddenScoreCard">
                <p><span class="scoreCardLables" id="p1Name">Name</span></p>
                <p class="scoreCont"><span class="scoreCardLables">Score</span>
                    <span class="scoreLableHide" id="p1Score"></span>
                </p>
            </div>
        </div>
        <div class="mainGameGrid hiddenBoard">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>
        <div class="detailCard playerTwoDetails">
            <div class="inputGroup showDetailInput">
                <label for="nameTwo">Player Two Name</label>
                <input class="inputStl playerTwo" name="nameTwo" id="nameTwo" required>
                <label for="playerTwoMarker">Enter your marker (eg. O)</label>
                <input class="inputStl markerTwo" name="playerTwoMarker" id="playerTwoMarker" maxlength="1" required>
            </div>
            <div class="scoreCardCmm scoreCardP2 hiddenScoreCard">
                <p><span class="scoreCardLables" id="p2Name">Name</span></p>
                <p class="scoreCont"><span class="scoreCardLables">Score</span>
                    <span class="scoreLableHide" id="p2Score"></span>
                </p>
            </div>
        </div>
    </div>
    <script src="game.js"></script>
</body>

</html>
