<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Tic Tac Toe</title>
</head>

<body>
    <nav class="mainNav">
        <div class="playResetBtn">Play</div>
        <div class="navTitle">TIC TAC TOE</div>
        <div class="playResetBtn">Reset</div>
    </nav>
    <div class="mainGameBody">
        <div class="playerOneDetails">
            <label for="nameOne">Player One Name</label>
            <input type="text" name="nameOne" id="nameOne" required>
            <label for="playerOneMarker">Enter your marker (eg. X)</label>
            <input type="text" name="playerOneMarker" id="playerOneMarker" required>
        </div>
        <div class="mainGameGrid">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>
        <div class="playerTwoDetails">
            <label for="nameTwo">Player Two Name</label>
            <input type="text" name="nameTwo" id="nameTwo" required>
            <label for="playerTwoMarker">Enter your marker (eg. O)</label>
            <input type="text" name="playerTwoMarker" id="playerTwoMarker" required>
        </div>
    </div>
    <script src="game.js"></script>
</body>

</html>
